<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="name.css">
</head>
<body>
  <div class="name-page">
    <div class="title-group">
      <div class="hover-area">
        <div class="kr-line">
          <span id="hover-word">명수대</span>아파트
        </div>

        <div id="hover-description" class="hover-description"></div>
      </div>

      <div class="en-line">Myeongsu-dae apartment</div>
    </div>
  </div>

  <script>
    const hoverWord = document.getElementById("hover-word");
    const hoverDescription = document.getElementById("hover-description");

    const fullText = "명수대는 맑은 한강물이 유유히 흐르는 경치가 좋은 곳이라 하여 일본인 기노시타 사카에가 붙인 이름이다";

    let typingInterval;
    let isTyping = false;

    function typeText() {
      clearInterval(typingInterval);
      hoverDescription.textContent = "";
      hoverDescription.classList.add("visible");

      let i = 0;
      isTyping = true;

      typingInterval = setInterval(() => {
        hoverDescription.textContent += fullText.charAt(i);
        i++;

        if (i >= fullText.length) {
          clearInterval(typingInterval);
          isTyping = false;
        }
      }, 65); // 속도: 숫자 작을수록 더 빠름
    }

    function hideText() {
      clearInterval(typingInterval);
      hoverDescription.textContent = "";
      hoverDescription.classList.remove("visible");
      isTyping = false;
    }

    hoverWord.addEventListener("mouseenter", () => {
      if (!isTyping) typeText();
    });

    hoverWord.addEventListener("mouseleave", () => {
      hideText();
    });
  </script>
</body>
</html>
